name: Test Suite

on:
  push:
    branches: [main, develop]
    paths:
      - "mtc_backtest/src/**"
      - "mtc_backtest/tests/**"
      - "mtc_backtest/scripts/**"
      - "mtc_backtest/pyproject.toml"
      - "mtc_backtest/requirements.txt"
  pull_request:
    branches: [main, develop]
    paths:
      - "mtc_backtest/src/**"
      - "mtc_backtest/tests/**"
      - "mtc_backtest/scripts/**"

defaults:
  run:
    working-directory: mtc_backtest

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: mtc_backtest/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: python -m ruff check src tests scripts

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: mtc_backtest/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -m "not parity and not slow" -v --tb=short -x

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: mtc_backtest/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run full integration suite
        run: python -m pytest tests/ -v --tb=short

      - name: Run test suite with coverage (3.11 only)
        if: always()
        run: |
          python -m pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: mtc_backtest/coverage.xml
          retention-days: 7
