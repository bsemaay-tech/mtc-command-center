setup_conditions:
  trend_continuation_long:
    - "close is above session VWAP"
    - "VWAP slope is non-negative"
    - "price is not range-bound/no-man's-land"
    - "intraday trend slope is positive"
    - "close breaks a recent range high"
  right_side_v_long:
    - "recent downside capitulation proxy occurred"
    - "current confirmed bar breaks prior bar high"
    - "price begins reclaiming toward VWAP or closes above prior high"
  short_side:
    - "symmetrical version for visual review only"

entry_trigger:
  long_pulse: "confirmed bar where trend_continuation_long OR right_side_v_long is true"
  short_pulse: "confirmed bar where short continuation OR upside capitulation reversal is true"
  no_lookahead: "uses only current and previous completed rows"

exit_trigger:
  primary: "prior-bar trailing stop breach"
  secondary: "VWAP rejection or time exit in wrapper"
  note: "exit logic is debug/visual only, not a profitability test"

stop_logic:
  initial_stop_long: "min(trigger bar low, previous bar low)"
  trailing_stop_long: "max(existing stop, previous bar low)"
  initial_stop_short: "max(trigger bar high, previous bar high)"
  trailing_stop_short: "min(existing stop, previous bar high)"

take_profit_logic:
  default: "disabled"
  optional_visual: "fixed R multiple in visual harness only"

invalidation:
  long: "close back below VWAP after entry, or trailing stop breach"
  short: "close back above VWAP after entry, or trailing stop breach"

filters:
  vwap_guard:
    - "reject long if steadily below VWAP unless downside capitulation"
    - "reject short if steadily above VWAP unless upside capitulation"
